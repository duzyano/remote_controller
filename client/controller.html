<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Controller</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/controller.css">
</head>
<body>

  <div class="header">
    <span class="title">Controller</span>
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">verbinden...</span>
    </div>
  </div>

  <div class="track-info">
    <div class="track-name" id="trackName">—</div>
    <div class="track-artist" id="trackArtist">wacht op display...</div>
  </div>

  <div class="seekbar-section">
    <div class="seekbar-times">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>
    <input type="range" id="seekbar" min="0" max="100" value="0">
  </div>

  <div class="controls">
    <div class="btn-row">
      <button class="btn seek-btn" onclick="send('seek_back')">
        ⏪
        <span class="btn-label">-5s</span>
      </button>
      <button class="btn" onclick="send('prev')">⏮</button>
      <button class="btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="btn" onclick="send('next')">⏭</button>
      <button class="btn seek-btn" onclick="send('seek_forward')">
        ⏩
        <span class="btn-label">+5s</span>
      </button>
    </div>

    <div class="btn-row">
      <button class="btn btn-vol" onclick="send('volume_down')">🔉</button>
      <div class="vol-label">
        <span id="volDisplay">70</span>
        <span style="font-size:10px;color:var(--muted)">vol</span>
      </div>
      <button class="btn btn-vol" onclick="send('volume_up')">🔊</button>
      <button class="btn btn-vol" id="localAudioBtn" onclick="toggleLocalAudio()">🔈</button>
    </div>
  </div>

  <audio id="audio"></audio>
  <script>
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    const playBtn = document.getElementById('playBtn');
    const seekbar = document.getElementById('seekbar');
    const volDisplay = document.getElementById('volDisplay');
    const trackNameEl = document.getElementById('trackName');
    const trackArtistEl = document.getElementById('trackArtist');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const localAudioBtn = document.getElementById('localAudioBtn');
    const audio = document.getElementById('audio');

    let isPlaying = false;
    let localAudioEnabled = false;
    let currentTrackSrc = '';
    let seekTimeout = null;
    let isSeeking = false;

    let serverIP = location.hostname;
    if (serverIP === 'localhost' || serverIP === '127.0.0.1') {
      serverIP = '10.16.35.23';
    }
    if (!serverIP || serverIP === 'localhost') {
      serverIP = prompt('Server IP adres:', '10.16.35.23');
    }

    const ws = new WebSocket(`ws://${serverIP}:3000`);

    ws.onopen = () => {
      statusBadge.classList.add('connected');
      statusText.textContent = 'verbonden';
    };

    ws.onclose = () => {
      statusBadge.classList.remove('connected');
      statusText.textContent = 'verbroken';
      setTimeout(() => location.reload(), 3000);
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'status') return;

      if (data.action === 'volume_up') volDisplay.textContent = Math.min(100, parseInt(volDisplay.textContent) + 10);
      if (data.action === 'volume_down') volDisplay.textContent = Math.max(0, parseInt(volDisplay.textContent) - 10);

      if (data.type === 'track_info') {
        trackNameEl.textContent = data.title;
        trackArtistEl.textContent = data.artist;
        currentTrackSrc = data.src || currentTrackSrc;
        if (localAudioEnabled && currentTrackSrc) {
          audio.src = currentTrackSrc;
          if (isPlaying) audio.play();
        }
      }

      // Alleen updaten als wij zelf niet aan het seeken zijn
      if (data.type === 'time_update' && !isSeeking) {
        seekbar.value = data.progress;
        currentTimeEl.textContent = data.current;
        totalTimeEl.textContent = data.total;
        if (localAudioEnabled && audio.duration) {
          const targetTime = (data.progress / 100) * audio.duration;
          if (Math.abs(audio.currentTime - targetTime) > 1) {
            audio.currentTime = targetTime;
          }
        }
      }

      if (data.type === 'play_state') {
        isPlaying = data.playing;
        updatePlayBtn();
        if (localAudioEnabled) {
          if (isPlaying) audio.play();
          else audio.pause();
        }
      }
    };

    function send(action, extra = {}) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action, ...extra }));
      }

      // Lokale audio direct aanpassen voor soepel gevoel
      if (localAudioEnabled && audio.src && audio.readyState >= 2 && audio.duration) {
        if (action === 'seek_back') {
          audio.currentTime = Math.max(0, audio.currentTime - 5);
        } else if (action === 'seek_forward') {
          audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
        }
      }
    }

    function togglePlay() {
      send('play_pause');
      isPlaying = !isPlaying;
      updatePlayBtn();
      if (localAudioEnabled) {
        if (isPlaying) audio.play();
        else audio.pause();
      }
    }

    function toggleLocalAudio() {
      localAudioEnabled = !localAudioEnabled;
      localAudioBtn.classList.toggle('active', localAudioEnabled);
      if (localAudioEnabled && currentTrackSrc) {
        audio.src = currentTrackSrc;
        if (isPlaying) audio.play();
      } else {
        audio.pause();
      }
      send('local_audio', { enabled: localAudioEnabled });
    }

    function updatePlayBtn() {
      if (isPlaying) {
        playBtn.textContent = '⏸';
        playBtn.classList.remove('paused');
        playBtn.classList.add('play-btn');
      } else {
        playBtn.textContent = '▶';
        playBtn.classList.add('paused');
      }
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      return `${m}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
    }

    seekbar.addEventListener('input', () => {
      isSeeking = true;
      clearTimeout(seekTimeout);
      seekTimeout = setTimeout(() => {
        const seekValue = parseInt(seekbar.value);
        send('seek', { value: seekValue });
        if (localAudioEnabled && audio.duration) {
          audio.currentTime = (seekValue / 100) * audio.duration;
        }
        setTimeout(() => { isSeeking = false; }, 500);
      }, 150);
    });

    audio.addEventListener('ended', () => {
      if (localAudioEnabled) send('next');
    });

    audio.addEventListener('timeupdate', () => {
      if (localAudioEnabled && audio.duration) {
        const progress = Math.round((audio.currentTime / audio.duration) * 100);
        seekbar.value = progress;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        totalTimeEl.textContent = formatTime(audio.duration);
      }
    });
  </script>
</body>
</html>
