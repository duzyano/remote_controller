<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Muziekspeler</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="player">
        <div class="header">
            <h1>WS — Muziekspeler</h1>
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <span id="statusText">wachten...</span>
            </div>
        </div>
        <div class="now-playing">
            <div class="track-info">
                <div class="album-art" id="albumArt">♫</div>
                <div class="track-text">
                    <div class="track-name" id="trackName">Geen nummer geladen</div>
                    <div class="track-artist" id="trackArtist">Voeg MP3's toe aan /client/music/</div>
                </div>
                <div class="volume-display">
                    <div class="volume-bar-wrap">
                        <div class="volume-bar-fill" id="volumeBar" style="height:70%"></div>
                    </div>
                    <div class="volume-label" id="volumeLabel">70</div>
                </div>
            </div>
            <div class="progress-section">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div class="progress-times">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
        </div>
        <div class="playlist">
            <div class="playlist-header">Playlist</div>
            <div id="playlistItems"></div>
        </div>
        <div class="log" id="log">—</div>
    </div>
    <audio id="audio"></audio>
    <script>
        const audio = document.getElementById('audio');
        const trackNameEl = document.getElementById('trackName');
        const trackArtistEl = document.getElementById('trackArtist');
        const albumArt = document.getElementById('albumArt');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeBar = document.getElementById('volumeBar');
        const volumeLabel = document.getElementById('volumeLabel');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const logEl = document.getElementById('log');
        const playlistItems = document.getElementById('playlistItems');

        // === VOEG HIER JE MP3-BESTANDEN TOE ===
        const tracks = [
            { title: 'Nummer 1', artist: 'Artiest 1', src: 'music/track1.mp3' },
            { title: 'Nummer 2', artist: 'Artiest 2', src: 'music/track2.mp3' },
            { title: 'Nummer 3', artist: 'Artiest 3', src: 'music/track3.mp3' },
        ];

        let currentIndex = 0;
        let volume = 0.7;

        function loadTrack(index) {
            if (index < 0) index = tracks.length - 1;
            if (index >= tracks.length) index = 0;
            currentIndex = index;
            const t = tracks[currentIndex];
            audio.src = t.src;
            audio.volume = volume;
            trackNameEl.textContent = t.title;
            trackArtistEl.textContent = t.artist;
            renderPlaylist();
        }

        function renderPlaylist() {
            playlistItems.innerHTML = '';
            tracks.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
                item.innerHTML = `
        <span class="playlist-num">${i === currentIndex ? '▶' : i + 1}</span>
        <span class="playlist-title">${t.title}</span>
        <span class="playlist-artist">${t.artist}</span>
      `;
                item.onclick = () => { loadTrack(i); audio.play(); };
                playlistItems.appendChild(item);
            });
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            return `${m}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
        }

        function setVolume(v) {
            volume = Math.max(0, Math.min(1, v));
            audio.volume = volume;
            volumeBar.style.height = (volume * 100) + '%';
            volumeLabel.textContent = Math.round(volume * 100);
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => { loadTrack(currentIndex + 1); audio.play(); });
        audio.addEventListener('play', () => albumArt.classList.add('playing'));
        audio.addEventListener('pause', () => albumArt.classList.remove('playing'));

        function setLog(msg) {
            logEl.textContent = `laatste commando: ${msg} — ${new Date().toLocaleTimeString()}`;
        }

        const ws = new WebSocket(`ws://${location.hostname}:3000`);
        ws.onopen = () => { statusBadge.classList.add('connected'); statusText.textContent = 'display verbonden'; };
        ws.onclose = () => { statusBadge.classList.remove('connected'); statusText.textContent = 'verbinding verbroken'; };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'status') {
                const n = data.controllers - 1;
                statusText.textContent = n > 0 ? `${n} controller${n > 1 ? 's' : ''} verbonden` : 'display verbonden';
                return;
            }
            setLog(data.action);
            switch (data.action) {
                case 'play_pause': if (audio.paused) { if (!audio.src || audio.src === location.href) loadTrack(0); audio.play(); } else audio.pause(); break;
                case 'next': loadTrack(currentIndex + 1); audio.play(); break;
                case 'prev': loadTrack(currentIndex - 1); audio.play(); break;
                case 'volume_up': setVolume(volume + 0.1); break;
                case 'volume_down': setVolume(volume - 0.1); break;
                case 'seek': if (audio.duration) audio.currentTime = (data.value / 100) * audio.duration; break;
            }
        };

        loadTrack(0);
    </script>
</body>

</html>
